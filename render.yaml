services:
  - type: web
    name: chicago-systems-bot
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm run build
    startCommand: node --enable-source-maps artifacts/bot/dist/index.mjs
    healthCheckPath: /status
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
